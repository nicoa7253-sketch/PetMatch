<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetMatch 🐾</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">

</head>

<body>


<header>

<h1>🐾 PetMatch</h1>

<p>
Marketplace de productos personalizados para mascotas
</p>

</header>



<main>



<section class="formulario">


<h2>Agregar producto</h2>


<input id="nombre" type="text" placeholder="Nombre">


<select id="categoria">

<option>Accesorio</option>
<option>Comida</option>
<option>Vestimenta</option>
<option>Higiene</option>
<option>Juguetes</option>
<option>Servicios</option>

</select>



<select id="mascota">

<option>Perro</option>
<option>Gato</option>
<option>Ave</option>
<option>Conejo</option>

</select>



<select id="edad">

<option>Cachorro</option>
<option>Adulto</option>
<option>Senior</option>

</select>



<textarea 
id="descripcion" 
placeholder="Descripción">
</textarea>



<input 
id="precio" 
type="number" 
placeholder="Precio">



<input 
id="stock" 
type="number" 
placeholder="Stock">



<input 
id="proveedor" 
type="text" 
placeholder="Proveedor">



<label>

<input 
id="personalizable" 
type="checkbox">

Personalizable

</label>



<button onclick="agregarProducto()">

Guardar producto

</button>



</section>





<section>


<h2>Buscar producto</h2>


<input 
id="buscarID" 
type="number" 
placeholder="ID producto">



<button onclick="buscarProducto()">

Buscar

</button>



<div id="resultadoBusqueda"></div>


</section>






<section>


<h2>Productos</h2>



<button class="borrar" onclick="borrarProductos()">

🗑️ Eliminar todos los productos

</button>



<div id="listaProductos"></div>



</section>




</main>



<script src="script.js"></script>


</body>

</html>
